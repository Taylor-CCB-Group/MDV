[build]
    command = "corepack enable && pnpm install --frozen-lockfile && pnpm run build-standalone"
    publish = "dist/mdv"

[build.environment]
    NODE_VERSION = "22"
    PNPM_VERSION = "10.21.0"

[[headers]]
    for = "/*"
    [headers.values]
        Cross-Origin-Embedder-Policy = "require-corp"
        Cross-Origin-Opener-Policy = "same-origin"

[[redirects]]
    from = "/project/:projectId"
    to = "/index.html"
    status = 200

[[redirects]]
    from = "/login_dev"
    to = "/login_dev.html"
    status = 200
